<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📋 Todo List</h1>
        
        <div class="stats">
            <div>Всего: <span id="totalTasks">0</span></div>
            <div>✅ <span id="completedTasks">0</span></div>
            <div>⏳ <span id="uncompletedTasks">0</span></div>
        </div>

        <div class="input-container">
            <input type="text" id="todoInput" placeholder="Новая задача...">
            <select id="categorySelect">
                <option value="work">💼 Работа</option>
                <option value="personal">🏠 Личное</option>
                <option value="shopping">🛒 Покупки</option>
                <option value="other">📌 Другое</option>
            </select>
            <button id="addBtn">➕ Добавить</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="pending">Активные</button>
            <button class="filter-btn" data-filter="completed">Выполненные</button>
        </div>

        <ul id="todoList" class="todo-list"></ul>
        
        <div id="emptyState" class="empty-state" style="display: none;">
            <p>Список пуст</p>
            <small>Добавьте первую задачу</small>
        </div>

        <button id="clearAll" class="clear-all">🗑️ Удалить выполненные</button>
    </div>

    <div id="notification" class="notification"></div>
    <script src="script.js"></script>
</body>
</html>
